<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Diet & Health</title>
    <link rel="stylesheet" href="style.css">
    <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;padding-bottom:1rem;}</style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><span>Loading...</span></div>
    <div class="container fade-in" style="max-width:420px;">
        <div class="card" style="text-align:center;padding:2rem;">
            <div style="font-size:2.5rem;margin-bottom:0.5rem;">🔒</div>
            <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:0.25rem;">Forgot Password</h1>
            <p class="text-muted text-sm" style="margin-bottom:1.5rem;">Enter your email to receive a reset token</p>
            <form id="forgot-form" style="text-align:left;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@email.com" required>
                </div>
                <div id="error-message" class="error-msg"></div>
                <div id="success-msg" class="alert alert-success" style="display:none;margin-bottom:1rem;"></div>
                <button type="submit" class="btn btn-full">Send Reset Token</button>
            </form>
            <p class="text-sm" style="margin-top:1.25rem;"><a href="login.html" style="color:var(--primary);font-weight:700;text-decoration:none;">← Back to Login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('forgot-form').onsubmit=async(e)=>{
            e.preventDefault();
            try{
                const r=await API.post('/user/forgot-password',{email:document.getElementById('email').value});
                if(r.success){
                    const s=document.getElementById('success-msg');
                    s.innerHTML=`Reset token generated.<br><strong style="word-break:break-all">${r.reset_token}</strong><br><small>Use this token on the reset page.</small>`;
                    s.style.display='block';
                    showToast('Reset token sent!');
                }
            }catch(e){}
        };
    </script>
</body>
</html>
