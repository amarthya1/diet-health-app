<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Analysis - NutriFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><span>Analyzing...</span></div>
    <header class="header">
        <a href="home.html" class="logo">🌿 NutriFlow</a>
        <nav class="nav-desktop"><a href="home.html">Home</a><a href="analysis.html">Analysis</a><a href="diet.html">Diet</a><a href="routine.html">Routine</a><a href="reminders.html">Reminders</a><a href="progress.html">Progress</a><a href="profile.html">Profile</a><button class="btn btn-outline btn-sm logout-btn">Logout</button></nav>
    </header>

    <div class="container" style="padding-top:1rem;">
        <h1 style="font-size:1.3rem;font-weight:800;margin-bottom:0.5rem;">🔬 Health Analysis</h1>
        <p class="text-sm text-muted mb-2">Get personalized health insights based on your symptoms</p>

        <!-- Analysis Form -->
        <div id="form-section">
            <div class="step-bar" id="step-bar"></div>
            <form id="analysis-form">
                <!-- Step 1: Body -->
                <div class="a-step" id="as1">
                    <div class="card"><h3 class="font-bold mb-1">📏 Body Measurements</h3>
                    <div class="grid-2">
                        <div class="form-group"><label>Height (cm)</label><input type="number" id="height" required></div>
                        <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>Age</label><input type="number" id="age" required></div>
                        <div class="form-group"><label>Gender</label><select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select></div>
                    </div>
                    <div id="bmi-box" class="card text-center" style="display:none;padding:0.75rem;background:var(--bg);"><span id="bmi-v" class="font-bold"></span> <span id="bmi-c" class="tag"></span></div>
                    </div>
                </div>
                <!-- Step 2: Symptoms -->
                <div class="a-step hidden" id="as2">
                    <div class="card"><h3 class="font-bold mb-1">🩺 Select Your Symptoms</h3>
                    <div class="grid-3" id="symptom-grid"></div>
                    </div>
                </div>
                <!-- Step 3: Reports -->
                <div class="a-step hidden" id="as3">
                    <div class="card"><h3 class="font-bold mb-1">📋 Doctor Reports (Optional)</h3>
                    <div class="grid-2">
                        <div class="form-group"><label>BP Systolic</label><input type="number" id="bp-sys" placeholder="120"></div>
                        <div class="form-group"><label>BP Diastolic</label><input type="number" id="bp-dia" placeholder="80"></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>Blood Sugar (mg/dL)</label><input type="number" id="sugar" placeholder="90"></div>
                        <div class="form-group"><label>Hemoglobin (g/dL)</label><input type="number" id="hgb" placeholder="14"></div>
                    </div>
                    <button type="button" class="btn btn-outline btn-sm" onclick="cur++;showStep();">Skip →</button>
                    </div>
                </div>
                <!-- Step 4: Lifestyle -->
                <div class="a-step hidden" id="as4">
                    <div class="card"><h3 class="font-bold mb-1">🌱 Lifestyle</h3>
                    <div class="grid-2">
                        <div class="form-group"><label>Food Preference</label><select id="food_pref"><option value="Veg">Vegetarian</option><option value="Non-Veg">Non-Veg</option><option value="Vegan">Vegan</option></select></div>
                        <div class="form-group"><label>Activity Level</label><select id="activity"><option value="sedentary">Sedentary</option><option value="light">Light</option><option value="moderate" selected>Moderate</option><option value="active">Active</option></select></div>
                    </div>
                    <div class="form-group"><label>Allergies</label><input type="text" id="allergies" placeholder="Dairy, Nuts, Gluten"></div>
                    <div class="form-group"><label>Current Medications</label><input type="text" id="meds" placeholder="e.g. Metformin, Thyronorm"></div>
                    <div class="form-group"><label>Health Goal</label><select id="goal"><option value="General Health">General Health</option><option value="Weight Loss">Weight Loss</option><option value="Muscle Gain">Muscle Gain</option></select></div>
                    </div>
                </div>

                <div id="error-message" class="error-msg"></div>
                <div class="flex gap-1 mt-1">
                    <button type="button" id="prevBtn" class="btn btn-outline btn-full hidden" onclick="cur--;showStep();">Back</button>
                    <button type="button" id="nextBtn" class="btn btn-full" onclick="cur++;showStep();">Next →</button>
                    <button type="submit" id="submitBtn" class="btn btn-full hidden">🔬 Analyze My Health</button>
                </div>
            </form>
        </div>

        <!-- Results Section (hidden initially) -->
        <div id="results-section" class="hidden"></div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="analysis.html" class="nav-item"><span>🔍</span>Analysis</a>
        <a href="diet.html" class="nav-item"><span>🥗</span>Diet</a>
        <a href="routine.html" class="nav-item"><span>📅</span>Routine</a>
        <a href="reminders.html" class="nav-item"><span>⏰</span>Reminders</a>
        <a href="profile.html" class="nav-item"><span>👤</span>Profile</a>
    </nav>

    <script src="script.js"></script>
    <script>
    const STEPS=4; let cur=1;
    const symptoms=[
        {n:'Hair Fall',e:'💇'},{n:'Fatigue',e:'😴'},{n:'Dandruff',e:'🌨️'},{n:'Dry Skin',e:'🏜️'},
        {n:'Weak Nails',e:'💅'},{n:'Night Blindness',e:'👁️'},{n:'Bleeding Gums',e:'🦷'},{n:'Skin Irritation',e:'😣'},
        {n:'Digestion Issues',e:'🤢'},{n:'Bone Pain',e:'🦴'},{n:'Weakness',e:'💪'},{n:'Pale Skin',e:'😶'},
        {n:'Mouth Ulcers',e:'😮'},{n:'Muscle Cramps',e:'🦵'},{n:'Depression',e:'😔'},{n:'Poor Concentration',e:'🧠'},
        {n:'Frequent Infections',e:'🤒'},{n:'Insomnia',e:'😪'},{n:'Anxiety',e:'😰'},{n:'Acne',e:'😤'},
        {n:'Back Pain',e:'🔙'},{n:'Weight Gain',e:'⚖️'}
    ];
    let selSymptoms=new Set();

    // Build step bar
    const sb=document.getElementById('step-bar');
    for(let i=1;i<=STEPS;i++){const d=document.createElement('div');d.className='step-dot'+(i===1?' active':'');d.id='sd'+i;sb.appendChild(d);}

    // Build symptom grid
    const sg=document.getElementById('symptom-grid');
    symptoms.forEach(s=>{
        const d=document.createElement('div');d.className='symptom-card';
        d.innerHTML=`<span class="emoji">${s.e}</span>${s.n}`;
        d.onclick=()=>{d.classList.toggle('selected');const k=s.n.toLowerCase();selSymptoms.has(k)?selSymptoms.delete(k):selSymptoms.add(k);};
        sg.appendChild(d);
    });

    // BMI live
    ['height','weight'].forEach(id=>{document.getElementById(id).oninput=()=>{
        const h=parseFloat(document.getElementById('height').value),w=parseFloat(document.getElementById('weight').value);
        if(h>0&&w>0){const b=calculateBMI(w,h);const c=getBMICategory(b);
        document.getElementById('bmi-v').textContent='BMI: '+b;
        const cat=document.getElementById('bmi-c');cat.textContent=c.cat;cat.style.background=c.color+'20';cat.style.color=c.color;
        document.getElementById('bmi-box').style.display='block';}
    };});

    // Prefill from user data
    const ud=Auth.getUser();
    if(ud.height)document.getElementById('height').value=ud.height;
    if(ud.weight)document.getElementById('weight').value=ud.weight;
    if(ud.age)document.getElementById('age').value=ud.age;
    if(ud.gender)document.getElementById('gender').value=ud.gender;
    if(ud.food_preference)document.getElementById('food_pref').value=ud.food_preference;
    if(ud.health_goals)document.getElementById('goal').value=ud.health_goals;

    function showStep(){
        for(let i=1;i<=STEPS;i++){document.getElementById('as'+i).classList.toggle('hidden',i!==cur);document.getElementById('sd'+i).className='step-dot'+(i<cur?' done':'')+(i===cur?' active':'');}
        document.getElementById('prevBtn').classList.toggle('hidden',cur===1);
        document.getElementById('nextBtn').classList.toggle('hidden',cur===STEPS);
        document.getElementById('submitBtn').classList.toggle('hidden',cur!==STEPS);
    }

    // Submit
    document.getElementById('analysis-form').onsubmit=async(e)=>{
        e.preventDefault();
        const bpSys=document.getElementById('bp-sys').value;
        const bpDia=document.getElementById('bp-dia').value;
        const payload={
            user_id:Auth.getUserId(),
            height:parseFloat(document.getElementById('height').value)||0,
            weight:parseFloat(document.getElementById('weight').value)||0,
            age:parseInt(document.getElementById('age').value)||0,
            gender:document.getElementById('gender').value,
            symptoms:[...selSymptoms],
            blood_pressure:bpSys&&bpDia?bpSys+'/'+bpDia:'',
            blood_sugar:parseFloat(document.getElementById('sugar').value)||0,
            hemoglobin:parseFloat(document.getElementById('hgb').value)||0,
            food_preference:document.getElementById('food_pref').value,
            activity_level:document.getElementById('activity').value,
            goal:document.getElementById('goal').value,
            allergies:document.getElementById('allergies').value,
            medications:document.getElementById('meds').value
        };
        try{
            const r=await API.post('/health/analyze-health',payload);
            showResults(r);
        }catch(e){}
    };

    function showResults(r){
        document.getElementById('form-section').classList.add('hidden');
        const rs=document.getElementById('results-section');
        rs.classList.remove('hidden');
        const scoreColor=r.health_score>=70?'#10B981':r.health_score>=40?'#F59E0B':'#EF4444';
        const deg=r.health_score/100*360;
        let html=`
        <div class="card text-center fade-in">
            <h3 class="font-bold mb-1">Your Health Score</h3>
            <div class="score-circle" style="background:conic-gradient(${scoreColor} ${deg}deg, var(--border) 0deg);">
                <div class="score-circle-inner">
                    <span class="score-number" style="color:${scoreColor}">${r.health_score}</span>
                    <span class="score-label">out of 100</span>
                </div>
            </div>
        </div>
        <div class="grid-2 fade-in">
            <div class="card text-center">
                <div class="text-xs text-muted">BMI</div>
                <div class="font-bold" style="font-size:1.5rem;">${r.bmi}</div>
                <span class="tag" style="background:${getBMICategory(r.bmi).color}20;color:${getBMICategory(r.bmi).color}">${r.bmi_category}</span>
            </div>
            <div class="card text-center">
                <div class="text-xs text-muted">Urgency</div>
                <div class="font-bold" style="font-size:1.2rem;">${r.urgency_level.toUpperCase()}</div>
                <span class="badge badge-${r.urgency_level==='high'?'danger':r.urgency_level==='medium'?'warning':'success'}">${r.see_doctor?'See Doctor':'Self-manageable'}</span>
            </div>
        </div>`;
        if(r.see_doctor){
            html+=`<div class="alert alert-danger fade-in"><strong>⚠️ Doctor Visit Recommended</strong><br>${r.see_doctor_reason}</div>`;
        }
        if(r.combined_diagnosis){
            html+=`<div class="alert alert-warning fade-in"><strong>🔎 Combined Diagnosis:</strong> ${r.combined_diagnosis}</div>`;
        }
        // Deficiencies
        if(r.deficiencies&&r.deficiencies.length){
            html+=`<div class="card fade-in"><h3 class="font-bold mb-1">🧬 Deficiencies Found</h3>`;
            r.deficiencies.forEach(d=>{
                const col=d.severity==='severe'?'red':d.severity==='moderate'?'orange':'green';
                html+=`<div style="padding:0.75rem 0;border-bottom:1px solid var(--border);">
                    <div class="flex items-center justify-between"><strong>${d.name}</strong><span class="tag tag-${col}">${d.severity}</span></div>
                    <div class="text-xs text-muted mt-1">Matched: ${d.symptoms_matched.join(', ')}</div>
                    ${d.tips?`<div class="text-xs mt-1">💡 ${d.tips}</div>`:''}
                </div>`;
            });
            html+=`</div>`;
        }
        // Doctor report
        const dr=r.doctor_report_analysis;
        if(dr&&(dr.blood_pressure_status||dr.blood_sugar_status||dr.hemoglobin_status)){
            html+=`<div class="card fade-in"><h3 class="font-bold mb-1">📋 Vitals Report</h3>`;
            if(dr.blood_pressure_status) html+=`<div class="meal-card"><div class="meal-icon" style="background:#DBEAFE;">🩸</div><div><div class="text-sm font-bold">Blood Pressure</div><div class="text-xs text-muted">${dr.blood_pressure_status}</div></div></div>`;
            if(dr.blood_sugar_status) html+=`<div class="meal-card"><div class="meal-icon" style="background:#FEF3C7;">🍬</div><div><div class="text-sm font-bold">Blood Sugar</div><div class="text-xs text-muted">${dr.blood_sugar_status}</div></div></div>`;
            if(dr.hemoglobin_status) html+=`<div class="meal-card"><div class="meal-icon" style="background:#FCE7F3;">🔬</div><div><div class="text-sm font-bold">Hemoglobin</div><div class="text-xs text-muted">${dr.hemoglobin_status}</div></div></div>`;
            html+=`</div>`;
        }
        // Foods
        if(r.recommended_foods&&r.recommended_foods.length){
            html+=`<div class="card fade-in"><h3 class="font-bold mb-1">🥗 Recommended Foods</h3><div style="display:flex;flex-wrap:wrap;gap:4px;">`;
            r.recommended_foods.forEach(f=>html+=`<span class="tag tag-green">${f}</span>`);
            html+=`</div></div>`;
        }
        if(r.foods_to_avoid&&r.foods_to_avoid.length){
            html+=`<div class="card fade-in"><h3 class="font-bold mb-1">🚫 Foods to Avoid</h3><div style="display:flex;flex-wrap:wrap;gap:4px;">`;
            r.foods_to_avoid.forEach(f=>html+=`<span class="tag tag-red">${f}</span>`);
            html+=`</div></div>`;
        }
        // Lifestyle
        if(r.lifestyle_advice&&r.lifestyle_advice.length){
            html+=`<div class="card fade-in"><h3 class="font-bold mb-1">✅ Lifestyle Advice</h3><ul style="padding-left:1.25rem;">`;
            r.lifestyle_advice.forEach(a=>html+=`<li class="text-sm" style="margin-bottom:6px;">${a}</li>`);
            html+=`</ul></div>`;
        }
        // Supplements
        if(r.supplement_suggestions&&r.supplement_suggestions.length){
            html+=`<div class="card fade-in"><h3 class="font-bold mb-1">💊 Supplement Suggestions</h3>`;
            r.supplement_suggestions.forEach(s=>html+=`<span class="tag tag-blue">${s}</span> `);
            html+=`</div>`;
        }
        // Actions
        html+=`<div class="grid-2 mt-2 mb-2">
            <a href="diet.html" class="btn btn-full">🥗 Generate Diet Plan</a>
            <a href="routine.html" class="btn btn-outline btn-full">📅 Generate Routine</a>
        </div>
        <button class="btn btn-outline btn-full mb-2" onclick="document.getElementById('form-section').classList.remove('hidden');document.getElementById('results-section').classList.add('hidden');cur=1;showStep();">🔄 Analyze Again</button>`;
        rs.innerHTML=html;
        rs.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
