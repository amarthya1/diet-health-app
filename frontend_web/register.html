<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NutriFlow</title>
    <link rel="stylesheet" href="style.css">
    <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;padding-bottom:1rem;}</style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><span>Loading...</span></div>
    <div class="container fade-in" style="max-width:420px;">
        <div class="card" style="text-align:center;padding:2rem;">
            <div style="font-size:2.5rem;margin-bottom:0.5rem;">🌿</div>
            <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:0.25rem;">Create Account</h1>
            <p class="text-muted text-sm" style="margin-bottom:1.5rem;">Start your wellness journey today</p>
            <form id="register-form" style="text-align:left;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                    <div id="pwd-strength" style="margin-top:6px;height:4px;border-radius:4px;background:var(--border);overflow:hidden;">
                        <div id="pwd-bar" style="height:100%;width:0;border-radius:4px;transition:all 0.3s;"></div>
                    </div>
                    <span id="pwd-text" class="text-xs text-muted"></span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>
                <div id="error-message" class="error-msg"></div>
                <button type="submit" class="btn btn-full" style="margin-top:0.5rem;">Create Account</button>
            </form>
            <p class="text-sm" style="margin-top:1.25rem;">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:700;text-decoration:none;">Login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        const pwdInput = document.getElementById('password');
        const bar = document.getElementById('pwd-bar');
        const txt = document.getElementById('pwd-text');
        pwdInput.oninput = ()=>{
            const v=pwdInput.value;let s=0;
            if(v.length>=6)s++;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
            const cols=['#EF4444','#F59E0B','#F59E0B','#10B981','#10B981'];
            const labs=['Weak','Fair','Good','Strong','Very Strong'];
            bar.style.width=(s/5*100)+'%';bar.style.background=cols[s-1]||'#EF4444';
            txt.textContent=v.length?labs[s-1]||'Too short':'';
        };
        document.getElementById('register-form').onsubmit = async(e)=>{
            e.preventDefault();
            const pw=document.getElementById('password').value;
            const cw=document.getElementById('confirm-password').value;
            if(pw!==cw){showError("Passwords don't match!");return;}
            if(pw.length<6){showError("Password must be at least 6 characters");return;}
            try {
                const r = await API.post('/user/register',{
                    name:document.getElementById('name').value,
                    email:document.getElementById('email').value,
                    password:pw
                });
                if(r.success || r.user_id) window.location.href='login.html?registered=1';
            } catch(e){}
        };
    </script>
</body>
</html>
